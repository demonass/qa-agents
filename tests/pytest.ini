[pytest]
# 测试目录
testpaths = ["tests"]

# 默认选项
addopts = 
    -v
    --tb=short
    --no-header
    -rN

# 覆盖率配置（需要安装 pytest-cov）
# addopts += --cov=agents --cov=skills --cov=tools --cov-report=term-missing

# 排除的测试
# ignore = tests/performance/test_ttft_and_tps.py

# 标记
markers =
    slow: 标记为慢测试（需要--run-slow选项）
    llm: 标记为需要LLM的测试
    integration: 标记为集成测试
    performance: 标记为性能测试

# Python路径
pythonpath = .

# 输出格式
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
